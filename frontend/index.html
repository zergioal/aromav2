<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar">
      <div class="nav-brand">
        <img src="img/logo.svg" alt="Logo Aroma" class="brand-icon" />
        <span class="brand-name">Aroma</span>
      </div>
      <ul class="nav-links" id="navLinks">
        <li><a href="#" class="nav-link" data-view="home">Inicio</a></li>
        <li><a href="#" class="nav-link" data-view="menu">Menú</a></li>
        <li><a href="#" class="nav-link" data-view="contact">Contacto</a></li>
      </ul>
    </nav>

    <main>
      <section id="view-home" class="view active">
        <h2>Inicio</h2>
        <p>Bienvenido a la cafeteria</p>
      </section>

      <section id="view-menu" class="view">
        <h2>Menu</h2>
        <p>Nuestros productos disponibles</p>
        <div id="products-container" class="products-container"></div>
      </section>

      <section id="view-contact" class="view">
        <h2>Contacto</h2>
        <p>Aqui va la info de contacto</p>
      </section>
    </main>

    <footer>
      <p>Derechos reservados 2026. Desarrollado por Sergio Alcocer</p>
    </footer>
    <script src="js/app.js"></script>
  </body>
</html>
